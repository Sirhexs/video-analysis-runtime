name: Release Video Analysis Runtime

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test server and native host
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match package version v$version"
          }
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: server
      - run: npm test
        working-directory: server
      - run: cargo check --locked --manifest-path native-host/Cargo.toml

  asr-bundle:
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 22 }
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            server/asr/requirements.txt
            server/asr/requirements-build.txt
      - name: Cache ASR bundle
        uses: actions/cache@v6
        with:
          path: dist/asr-bundle
          key: asr-small-${{ hashFiles('server/asr/**', 'tools/build-asr-bundle.mjs') }}
      - name: Build ASR bundle
        shell: pwsh
        run: |
          if (-not (Test-Path dist/asr-bundle/asr-manifest.json)) {
            python -m venv server/asr/.venv
            server/asr/.venv/Scripts/python.exe -m pip install -r server/asr/requirements.txt -r server/asr/requirements-build.txt
            server/asr/.venv/Scripts/python.exe -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='Systran/faster-whisper-small', local_dir='dist/model-small')"
            node tools/build-asr-bundle.mjs --model-dir=dist/model-small
          }
      - uses: actions/upload-artifact@v7
        with:
          name: asr-bundle
          path: dist/asr-bundle
          if-no-files-found: error

  build:
    needs: asr-bundle
    runs-on: windows-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        profile: [cloud, hybrid, douyin-cloud, douyin-hybrid]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 22, cache: npm, cache-dependency-path: server/package-lock.json }
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: server
      - uses: actions/download-artifact@v8
        if: contains(matrix.profile, 'hybrid')
        with:
          name: asr-bundle
          path: dist/asr-bundle
      - name: Install FFmpeg and Inno Setup
        run: choco install ffmpeg innosetup --no-progress -y
      - name: Locate real FFmpeg binaries
        shell: pwsh
        run: |
          $chocoRoot = if ($env:ChocolateyInstall) { $env:ChocolateyInstall } else { Join-Path $env:ProgramData 'chocolatey' }
          $toolsDir = Join-Path $chocoRoot 'lib\ffmpeg\tools'
          $ffmpeg = Get-ChildItem -LiteralPath $toolsDir -Filter ffmpeg.exe -File -Recurse | Select-Object -First 1
          if (-not $ffmpeg) { throw "Cannot find the real ffmpeg.exe under $toolsDir" }
          $ffprobe = Join-Path $ffmpeg.DirectoryName 'ffprobe.exe'
          if (-not (Test-Path -LiteralPath $ffprobe -PathType Leaf)) { throw "Cannot find ffprobe.exe beside $($ffmpeg.FullName)" }
          "FFMPEG_PATH=$($ffmpeg.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FFPROBE_PATH=$ffprobe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build desktop profile
        run: node tools/build-desktop.mjs --profile=${{ matrix.profile }}
      - name: Build installer
        env:
          VIDEO_ANALYSIS_CHROME_EXTENSION_ID: nfiieinehobmaofhodfaccgjboegcdck
          VIDEO_ANALYSIS_EDGE_EXTENSION_ID: nfiieinehobmaofhodfaccgjboegcdck
        run: node tools/build-installer.mjs --profile=${{ matrix.profile }}
      - name: Profile smoke test
        run: node tools/test-desktop-smoke.mjs --profile=${{ matrix.profile }}
      - uses: actions/upload-artifact@v7
        with:
          name: runtime-${{ matrix.profile }}
          path: |
            dist/installer/*.exe
            dist/installer/*.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v8
        with: { path: artifacts, pattern: runtime-*, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with: { files: artifacts/*.exe }
